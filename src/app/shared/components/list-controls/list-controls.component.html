<div class="list-controls-container">
  <app-search-bar
    [placeholder]="searchPlaceholder"
    [items]="items"
    [finalFilteredCount]="finalFilteredCount"
    [itemType]="itemType"
    [hasBasalFilter]="showBasalFilter && basalOnly"
    [addButtonLabel]="addButtonLabel"
    [initialSearchTerm]="initialSearchTerm"
    (searchResults)="onSearchResults($event)"
    (searchTermChange)="onSearchTermChange($event)"
    class="search-bar-wrapper">
  </app-search-bar>
  
  <div class="controls-filters">
    <mat-checkbox
      *ngIf="showBasalFilter"
      [(ngModel)]="basalOnly"
      (change)="onBasalFilterChange()"
      class="basal-filter-checkbox">
      Basal Only
    </mat-checkbox>
    
    <mat-checkbox
      *ngIf="showPendingFilter"
      [(ngModel)]="pendingOnly"
      (change)="onPendingFilterChange()"
      class="pending-filter-checkbox">
      Pending only
    </mat-checkbox>

    <button
      *ngIf="showExportButton"
      mat-stroked-button
      color="primary"
      class="export-button"
      (click)="onExportClick()"
      matTooltip="Export current results to Excel">
      <mat-icon *ngIf="!exportLoading">download</mat-icon>
      <mat-spinner
        *ngIf="exportLoading"
        diameter="20"
        strokeWidth="3"
        class="export-spinner">
      </mat-spinner>
      <span>&nbsp;{{ exportLabel }}</span>
    </button>
    
    <app-view-mode-selector
      [currentMode]="currentViewMode"
      (modeChange)="onViewModeChange($event)">
    </app-view-mode-selector>
    
    <button 
      *ngIf="!readonly && addRoute"
      mat-raised-button 
      color="primary" 
      [routerLink]="addRoute"
      class="add-button">
      <mat-icon>add</mat-icon>
      {{ addButtonLabel }}
    </button>
  </div>
</div>
