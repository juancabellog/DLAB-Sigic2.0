<div class="register-container">
  <mat-card class="register-card">
    <mat-card-header>
      <mat-card-title>Add Account</mat-card-title>
      <mat-card-subtitle>Join the Scientific Products Platform</mat-card-subtitle>
    </mat-card-header>
    
    <mat-card-content>
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <mat-form-field class="full-width">
          <mat-label>Username</mat-label>
          <input matInput formControlName="username" required>
          <mat-error *ngIf="registerForm.get('username')?.hasError('required')">
            Username is required
          </mat-error>
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" required>
          <mat-error *ngIf="registerForm.get('email')?.hasError('required')">
            Email is required
          </mat-error>
          <mat-error *ngIf="registerForm.get('email')?.hasError('email')">
            Please enter a valid email
          </mat-error>
        </mat-form-field>

        <div class="full-width">
          <label class="form-label">Researcher (RRHH)*</label>
          <app-researcher-search 
            [disabled]="loading"
            [clearOnSelect]="false"
            [selectedResearcher]="selectedResearcher"
            (researcherSelected)="onResearcherSelected($event)">
          </app-researcher-search>
          <div class="error-message" *ngIf="registerForm.get('rrhhId')?.hasError('required') && registerForm.get('rrhhId')?.touched">
            Please select a researcher
          </div>
        </div>

        <mat-form-field class="full-width">
          <mat-label>Password</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" required>
          <button mat-icon-button matSuffix type="button" (click)="togglePasswordVisibility()" 
                  [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hidePassword">
            <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <mat-error *ngIf="registerForm.get('password')?.hasError('required')">
            Password is required
          </mat-error>
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>Confirm Password</mat-label>
          <input matInput [type]="hideConfirmPassword ? 'password' : 'text'" formControlName="confirmPassword" required>
          <button mat-icon-button matSuffix type="button" (click)="toggleConfirmPasswordVisibility()" 
                  [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hideConfirmPassword">
            <mat-icon>{{hideConfirmPassword ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <mat-error *ngIf="registerForm.get('confirmPassword')?.hasError('required')">
            Please confirm your password
          </mat-error>
          <mat-error *ngIf="registerForm.get('confirmPassword')?.hasError('passwordMismatch')">
            Passwords do not match
          </mat-error>
        </mat-form-field>

        <div class="register-actions">
          <button mat-raised-button color="primary" type="submit" 
                  [disabled]="registerForm.invalid || loading" class="full-width">
            <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
            <span *ngIf="!loading">Add Account</span>
          </button>
        </div>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <button mat-button routerLink="/login">Already have an account? Sign In</button>
    </mat-card-actions>
  </mat-card>
</div>
